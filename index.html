<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSA Pro</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --surface: #1a2234;
    --accent: #22d3ee;
    --accent-dim: rgba(34,211,238,0.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #f1f5f9;
    --muted: #64748b;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(34,211,238,0.3);
    --font: 'DM Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  /* ── WRAPPER ── */
  .wrap {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 0 6px;
  }
  .logo {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0.8;
  }
  .logo span { color: var(--muted); }

  /* ── SEARCH ── */
  .search-row {
    display: flex;
    gap: 8px;
  }
  .inp-wrap {
    position: relative;
    flex: 1;
  }
  .inp-prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--muted);
    pointer-events: none;
    letter-spacing: 1px;
  }
  input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 2px;
    padding: 14px 14px 14px 52px;
    border-radius: 12px;
    outline: none;
    text-transform: uppercase;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { font-size: 14px; letter-spacing: 1px; color: var(--muted); }

  .btn-search {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0 22px;
    border-radius: 12px;
    cursor: pointer;
    font-family: var(--font);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: 0.85; }
  .btn-search:active { transform: scale(0.97); }
  .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── HISTORIAL ── */
  .history-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 28px;
  }
  .hist-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hist-chip:hover { border-color: var(--border-hover); color: var(--accent); }
  .hist-chip .x {
    color: #475569;
    font-size: 10px;
    line-height: 1;
    padding: 0 2px;
  }
  .hist-chip .x:hover { color: var(--red); }

  /* ── SKELETON / LOADING ── */
  .skeleton {
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .skel-block {
    background: linear-gradient(90deg, var(--surface) 25%, #1e2d40 50%, var(--surface) 75%);
    background-size: 200% 100%;
    border-radius: 10px;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── MAIN RESULT CARD ── */
  .result { display: none; flex-direction: column; gap: 10px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  /* nombre + FSP */
  .node-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .node-name {
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .fsp {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
  .avail-badge {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.3;
  }
  .avail-badge .count { font-size: 20px; display: block; }

  /* QR row */
  .qr-row {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px 22px;
  }
  #qr-canvas {
    border-radius: 10px;
    flex-shrink: 0;
    image-rendering: pixelated;
  }
  .qr-info { flex: 1; }
  .qr-code-label {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 10px;
  }
  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 6px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    text-transform: uppercase;
  }
  .copy-btn:hover { border-color: var(--border-hover); color: var(--accent); }
  .copy-btn.copied { color: var(--green); border-color: rgba(52,211,153,0.3); }

  .coords {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .maps-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 11px;
    background: rgba(66,133,244,0.12);
    color: #60a5fa;
    border: 1px solid rgba(66,133,244,0.2);
    text-decoration: none;
    border-radius: 7px;
    font-size: 11px;
    letter-spacing: 1px;
    font-family: var(--font);
    transition: background 0.15s;
  }
  .maps-btn:hover { background: rgba(66,133,244,0.22); }

  /* ── TABLA DE PUERTOS ── */
  .ports-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .ports-title {
    padding: 14px 20px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ports-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  }
  .port-cell {
    padding: 14px 16px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background 0.15s;
  }
  .port-cell:hover { background: rgba(255,255,255,0.02); }
  .port-cell.is-free { background: var(--green-dim); }
  .port-num {
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    line-height: 1;
  }
  .port-status { font-size: 11px; letter-spacing: 1px; }
  .port-status.free { color: var(--green); }
  .port-status.occ { color: var(--muted); font-size: 10px; letter-spacing: 0.5px; word-break: break-all; }

  /* ── ANIMACIÓN ENTRADA ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeUp 0.25s ease forwards; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .qr-row { flex-direction: column; align-items: flex-start; }
    .node-name { font-size: 18px; }
    .ports-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">GSA <span>//</span> Pro</div>
  </header>

  <!-- BUSCADOR -->
  <div class="search-row">
    <div class="inp-wrap">
      <span class="inp-prefix">TP ›</span>
      <input type="text" id="qrIn" placeholder="Código de splitter..." autocomplete="off" autofocus>
    </div>
    <button class="btn-search" id="btnSearch" onclick="buscar()">Buscar</button>
  </div>

  <!-- HISTORIAL -->
  <div class="history-row" id="histRow"></div>

  <!-- SKELETON LOADER -->
  <div class="skeleton" id="skeleton">
    <div class="skel-block" style="height:110px"></div>
    <div class="skel-block" style="height:140px"></div>
    <div class="skel-block" style="height:200px"></div>
  </div>

  <!-- RESULTADO -->
  <div class="result" id="result">
    <div class="card anim">
      <div class="node-header">
        <div>
          <div class="node-name" id="n">—</div>
          <div class="fsp" id="fsp">—</div>
        </div>
        <div class="avail-badge" id="avail-badge">
          <span class="count" id="li">0</span>
          <span id="avail-label">/ <span id="to">0</span> libres</span>
        </div>
      </div>
      <div class="qr-row">
        <canvas id="qr-canvas" width="128" height="128"></canvas>
        <div class="qr-info">
          <div class="qr-code-label" id="qr-label">—</div>
          <button class="copy-btn" id="copyBtn" onclick="copiarQR()">Copiar código</button>
          <div class="coords" id="coords">—</div>
          <a class="maps-btn" id="mapsLink" href="#" target="_blank">Ver en Maps →</a>
        </div>
      </div>
    </div>

    <div class="ports-card anim" style="animation-delay:0.05s">
      <div class="ports-title">
        <span>Puertos</span>
        <span id="ports-summary">—</span>
      </div>
      <div class="ports-grid" id="portsGrid"></div>
    </div>
  </div>

</div>

<script>
// ── CONFIGURACIÓN ──
const PROXY = "https://script.google.com/macros/s/AKfycbyWJGhLSe13Su18iNlKxOJb9dfWhO-y9bTztVjDxSjOFEgXV0fSomewghHgBzEBaRVHrQ/exec";
const API_BASE = "https://apiservice.sistemastp.com.mx/gsa/lite/v1/port/qr?qr=";
const HIST_KEY = "gsa_history";
const MAX_HIST = 8;

let currentQR = "";

// ── HISTORIAL ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || "[]"); } catch { return []; }
}
function saveHistory(q) {
  let h = getHistory().filter(x => x !== q);
  h.unshift(q);
  if (h.length > MAX_HIST) h = h.slice(0, MAX_HIST);
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
}
function removeHistory(q) {
  const h = getHistory().filter(x => x !== q);
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
  renderHistory();
}
function renderHistory() {
  const row = document.getElementById("histRow");
  const h = getHistory();
  if (!h.length) { row.innerHTML = ""; return; }
  row.innerHTML = h.map(q =>
    `<div class="hist-chip" onclick="buscarDirecto('${q}')">
      ${q}
      <span class="x" onclick="event.stopPropagation();removeHistory('${q}')">✕</span>
    </div>`
  ).join("");
}
function buscarDirecto(q) {
  document.getElementById("qrIn").value = q;
  buscar();
}

// ── QR GENERATOR (puro canvas, sin librería) ──
// Implementación QR Code mínima usando la spec QR versión 1-6
// Para no depender de qrcodejs (lento y pesado), usamos una lib pequeña vía CDN
let QRious;
const qrScript = document.createElement("script");
qrScript.src = "https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js";
document.head.appendChild(qrScript);

function dibujarQR(texto) {
  if (!QRious && window.QRious) QRious = window.QRious;
  if (!window.QRious) { setTimeout(() => dibujarQR(texto), 50); return; }
  new window.QRious({
    element: document.getElementById("qr-canvas"),
    value: texto,
    size: 128,
    level: "H",
    background: "#ffffff",
    foreground: "#000000"
  });
}

// ── ESTADO UI ──
function setLoading(on) {
  const sk = document.getElementById("skeleton");
  const re = document.getElementById("result");
  const btn = document.getElementById("btnSearch");
  sk.style.display = on ? "flex" : "none";
  if (on) re.style.display = "none";
  btn.disabled = on;
  btn.textContent = on ? "..." : "Buscar";
}

// ── BÚSQUEDA ──
async function buscar() {
  const input = document.getElementById("qrIn");
  const q = input.value.trim().toUpperCase().replace(/\s+/g, "");
  if (!q) { input.focus(); return; }

  currentQR = q;
  setLoading(true);

  try {
    const url = `${PROXY}?url=${encodeURIComponent(API_BASE + q)}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    if (d.splitters && d.splitters.length > 0) {
      render(d, q);
      saveHistory(q);
      renderHistory();
      input.value = "";
      input.blur();
    } else {
      alert("QR no encontrado o sin datos técnicos.");
      input.select();
    }
  } catch (e) {
    console.error(e);
    alert("Error de conexión. Verifica que el proxy de Google Script esté activo.");
    input.select();
  } finally {
    setLoading(false);
  }
}

// ── RENDER ──
function render(d, q) {
  const s = d.splitters[0];
  const puertos = s.listmodelpuertos || [];

  // Nombre y FSP
  const nombre = s.nombre || d.nombreCaja || "NODO SIN NOMBRE";
  document.getElementById("n").textContent = nombre;
  document.getElementById("fsp").textContent = `F ${s.frame}  ·  S ${s.slot}  ·  P ${s.puerto}`;

  // Disponibilidad
  const libres = puertos.filter(p => p.estatusPuerto == "1").length;
  const total = puertos.length;
  document.getElementById("li").textContent = libres;
  document.getElementById("to").textContent = total;

  const badge = document.getElementById("avail-badge");
  const pct = total ? libres / total : 0;
  if (pct === 0) {
    badge.style.background = "rgba(248,113,113,0.12)";
    badge.style.color = "#f87171";
    badge.style.border = "1px solid rgba(248,113,113,0.2)";
  } else if (pct < 0.3) {
    badge.style.background = "rgba(251,191,36,0.12)";
    badge.style.color = "#fbbf24";
    badge.style.border = "1px solid rgba(251,191,36,0.2)";
  } else {
    badge.style.background = "var(--green-dim)";
    badge.style.color = "var(--green)";
    badge.style.border = "1px solid rgba(52,211,153,0.2)";
  }

  // QR
  document.getElementById("qr-label").textContent = q;
  dibujarQR(q);

  // Coordenadas y Maps
  const lat = d.latitud, lon = d.longitud;
  document.getElementById("coords").textContent = `${lat}, ${lon}`;
  document.getElementById("mapsLink").href =
    `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;

  // Resumen puertos
  document.getElementById("ports-summary").textContent =
    `${libres} libre${libres !== 1 ? "s" : ""} de ${total}`;

  // Grid de puertos (DOM eficiente con fragment)
  const grid = document.getElementById("portsGrid");
  const frag = document.createDocumentFragment();
  grid.innerHTML = "";

  for (const p of puertos) {
    const libre = p.estatusPuerto == "1";
    const cell = document.createElement("div");
    cell.className = "port-cell" + (libre ? " is-free" : "");

    const num = document.createElement("div");
    num.className = "port-num";
    num.textContent = p.numeroPuerto;

    const st = document.createElement("div");
    st.className = "port-status " + (libre ? "free" : "occ");
    st.textContent = libre ? "LIBRE" : (p.cuenta || "OCUPADO");

    cell.appendChild(num);
    cell.appendChild(st);
    frag.appendChild(cell);
  }
  grid.appendChild(frag);

  // Mostrar resultado
  document.getElementById("result").style.display = "flex";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── COPIAR QR ──
function copiarQR() {
  if (!currentQR) return;
  navigator.clipboard.writeText(currentQR).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "¡Copiado!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "Copiar código";
      btn.classList.remove("copied");
    }, 1800);
  });
}

// ── ENTER ──
document.getElementById("qrIn").addEventListener("keypress", e => {
  if (e.key === "Enter") buscar();
});

// ── INIT ──
renderHistory();
</script>
</body>
</html>
