<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSA Pro - Visor Premium v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0b0f19; /* Fondo oscuro profundo revisado */
            --card: #1f2937; /* Fondo de tarjeta gris oscuro */
            --accent: #38bdf8; /* Celeste brillante Totalplay */
            --green: #4ade80; /* Verde neón para libre */
            --text: #f3f4f6; /* Blanco grisáceo para texto */
            --border: #374151; /* Gris para bordes */
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; /* Centra horizontalmente */
            align-items: flex-start; /* Alinea al inicio verticalmente */
            height: 100vh; 
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- CONTENEDOR PRINCIPAL CENTRADO (TARJETA PREMIUM) --- */
        .app-container {
            width: 100%;
            max-width: 650px; /* Ancho máximo elegante revisado */
            background: var(--card);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mantiene bordes redondeados */
            max-height: 96vh; /* Evita que toque los bordes superior/inferior */
        }

        /* --- CABECERA Y BUSCADOR (FIJO ARRIBA) --- */
        .header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            background: rgba(31, 41, 55, 0.9);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .search-bar { display: flex; gap: 12px; }
        input { 
            flex: 1; 
            background: rgba(0,0,0,0.5); 
            border: 2px solid var(--border); 
            padding: 16px; 
            border-radius: 14px; 
            color: #fff; 
            outline: none; 
            font-size: 18px; /* LETRA GRANDE */
            text-transform: uppercase;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.8); }
        button { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 0 25px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        /* --- ZONA DE RESULTADOS (SCROLLABLE) --- */
        .results {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: none; /* Se oculta hasta buscar */
        }

        /* --- PANEL PRINCIPAL (CENTRALIZADO) --- */
        .main-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra el contenido */
            text-align: center;
        }

        #n { 
            font-size: 32px; /* LETRA MUY GRANDE */
            font-weight: 900; 
            color: var(--accent); 
            margin-bottom: 8px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .fsp-badge { 
            font-size: 16px; /* LETRA GRANDE */
            color: var(--accent); 
            background: rgba(56, 189, 248, 0.1); 
            padding: 6px 16px; 
            border-radius: 10px; 
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            letter-spacing: 1px;
        }

        /* --- TEXTO DEL QR ESCRITO (NUEVO) --- */
        #qr-text {
            font-size: 24px; /* LETRA GRANDE */
            font-weight: 900;
            color: #fff; /* Blanco puro para contraste */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px; /* Espacio antes del QR visual */
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        /* --- CONTENEDOR DEL QR VISUAL GIGANTE --- */
        #qrcode-container {
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
            display: inline-block; /* Se ajusta al tamaño del QR */
        }

        /* --- GRID SECUNDARIO (MAPS, DISPO) --- */
        .sec-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .sec-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 18px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .sec-card:hover { border-color: rgba(56, 189, 248, 0.5); }
        .sec-card b { font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 8px;}
        .sec-val { font-size: 18px; font-weight: bold; color: var(--text); }
        .maps-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #4285F4; /* Azul Google */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .maps-btn:hover { background: #357ae8; }

        /* --- TABLA DE PUERTOS PREMIUM (OPTIMIZADA) --- */
        .table-wrap { 
            background: rgba(0,0,0,0.1); 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
        }
        table { width: 100%; border-collapse: collapse; font-size: 17px; /* LETRA GRANDE EN TABLA */ }
        th { 
            background: rgba(55, 65, 81, 0.7); 
            color: var(--accent); 
            padding: 14px 18px; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            text-align: center;
        }
        td { padding: 14px 18px; text-align: center; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .p-num { font-size: 20px; font-weight: 900; color: #fff; } /* Número de puerto resaltado */
        .free { color: var(--green); font-weight: bold; background: rgba(74, 222, 128, 0.1); border-radius: 8px; padding: 4px 10px; }
        .occ { color: #94a3b8; font-size: 15px; font-weight: normal; }

        /* Scrollbar estilizado */
        .results::-webkit-scrollbar { width: 8px; }
        .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .results::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }

        /* Ajustes para móviles muy pequeños */
        @media (max-width: 500px) {
            body { padding: 10px; }
            #n { font-size: 26px; }
            #qr-text { font-size: 20px; }
            .p-num { font-size: 18px; }
            table { font-size: 15px; }
            .search-bar { flex-direction: column; gap: 8px; }
            button { padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="search-bar">
                <input type="text" id="qrIn" placeholder="Introducir TP..." autocomplete="off" autofocus>
                <button onclick="buscar()">BUSCAR</button>
            </div>
        </div>

        <div id="res" class="results">
            <div class="main-panel">
                <div id="n">-</div> <div class="fsp-badge" id="fsp">-</div> <div id="qr-text">-</div>

                <div id="qrcode-container">
                    <div id="qrcode"></div>
                </div>
            </div>

            <div class="sec-grid">
                <div class="sec-card">
                    <b>Ubicación</b>
                    <div class="sec-val" id="co" style="font-size: 13px;">-</div>
                    <a id="ma" href="#" target="_blank" class="maps-btn">📍 Abrir Maps</a>
                </div>
                <div class="sec-card" style="border-top: 3px solid var(--green);">
                    <b>Disponibilidad</b>
                    <div class="sec-val"><span id="li" style="color:var(--green)">0</span> / <span id="to">0</span></div>
                    <small style="font-size:12px; color:#9ca3af">Puertos Libres</small>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Puerto</th>
                            <th>Estado / Cuenta Cliente</th>
                        </tr>
                    </thead>
                    <tbody id="tb">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Configuración del generador de QR - GIGANTE (200x200) y Alta Calidad
        const qrGen = new QRCode(document.getElementById("qrcode"), { 
            width: 200, 
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H // Máxima corrección de errores para escaneo fácil
        });

        // USA TU URL DE GOOGLE SCRIPT AQUÍ
        const PROXY_URL = "https://script.google.com/macros/s/AKfycbyWJGhLSe13Su18iNlKxOJb9dfWhO-y9bTztVjDxSjOFEgXV0fSomewghHgBzEBaRVHrQ/exec"; 

        async function buscar() {
            const input = document.getElementById('qrIn');
            const q = input.value.trim().toUpperCase();
            if(!q) return;

            input.value = "Buscando...";
            const target = `https://apiservice.sistemastp.com.mx/gsa/lite/v1/port/qr?qr=${q}`;

            try {
                // Petición al túnel de Google Apps Script
                const r = await fetch(`${PROXY_URL}?url=${encodeURIComponent(target)}`);
                const d = await r.json();

                if (d.splitters && d.splitters.length > 0) {
                    render(d, q);
                    input.value = ''; // Limpia el buscador para la próxima
                    input.blur(); // Esconde el teclado en móviles
                } else { 
                    alert("QR no encontrado o sin datos técnicos en Sistemastp."); 
                    input.value = q; // Restaura el valor para reintentar
                }
            } catch (e) { 
                console.error("Error detallado:", e);
                alert("Error de conexión. Verifica que el Proxy de Google Script esté activo y publicado."); 
                input.value = q;
            }
        }

        function render(d, q) {
            const s = d.splitters[0];
            const p = s.listmodelpuertos;

            // 1. Datos Principales (con fallback)
            document.getElementById('n').innerText = s.nombre || d.nombreCaja || "NODO SIN NOMBRE";
            document.getElementById('fsp').innerText = `F:${s.frame} | S:${s.slot} | P:${s.puerto}`;
            
            // 2. Texto del QR Escrito (GRANDE)
            document.getElementById('qr-text').innerText = q;

            // 3. Generar QR Visual Gigante
            qrGen.clear(); 
            qrGen.makeCode(q);

            // 4. Datos Secundarios y Google Maps
            document.getElementById('co').innerText = `${d.latitud}, ${d.longitud}`;
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${d.latitud},${d.longitud}`;
            document.getElementById('ma').href = googleMapsUrl;

            // 5. Contadores de Disponibilidad
            const libres = p.filter(x => x.estatusPuerto == "1").length;
            document.getElementById('li').innerText = libres;
            document.getElementById('to').innerText = p.length;

            // 6. Renderizado Eficiente de la Tabla de Puertos
            const tbody = document.getElementById('tb');
            tbody.innerHTML = ""; // Limpia la tabla anterior
            let rows = ''; // Acumulador de filas para mejor rendimiento
            
            for(let i=0; i<p.length; i++){
                const puerto = p[i];
                const esLibre = puerto.estatusPuerto == "1";
                
                rows += `<tr>
                    <td class="p-num">${puerto.numeroPuerto}</td>
                    <td>
                        <span class="${esLibre ? 'free' : 'occ'}">
                            ${esLibre ? 'LIBRE' : 'CTA: ' + (puerto.cuenta || 'OCUPADO')}
                        </td>
                    </td>
                </tr>`;
            }
            
            tbody.innerHTML = rows; // Inyecta todas las filas de golpe
            document.getElementById('res').style.display = 'block'; // Muestra la zona de resultados
            
            // Scroll automático hacia arriba de la tarjeta de resultados
            document.getElementById('res').scrollTop = 0;
        }

        // Ejecutar búsqueda al presionar la tecla Enter
        document.getElementById('qrIn').addEventListener('keypress', e => { if(e.key === 'Enter') buscar(); });
    </script>
</body>
</html>
