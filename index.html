<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSA Pro - Ultra Fast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --blue: #053b6f; --sky: #007bff; --green: #28a745; --gray: #f0f2f5; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* DASHBOARD LAYOUT */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .sidebar { width: 260px; background: white; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }

        /* CARDS */
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .search-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; text-transform: uppercase; }
        input:focus { border-color: var(--sky); }
        button { background: var(--blue); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .data-card { background: white; padding: 12px; border-radius: 10px; border-top: 4px solid var(--sky); position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .data-card b { font-size: 10px; color: #888; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: bold; color: var(--blue); margin-top: 4px; }
        .fsp-badge { display: inline-block; background: #e3f2fd; color: var(--sky); padding: 2px 8px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        
        #qrcode { position: absolute; top: 10px; right: 10px; }

        /* TABLA RAPIDA */
        .table-container { background: white; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--blue); color: white; padding: 10px; text-align: center; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }
        .st-1 { color: var(--green); font-weight: bold; background: #e8f5e9; padding: 2px 6px; border-radius: 4px; } /* LIBRE */
        .st-occ { color: #666; font-size: 11px; }

        /* HISTORIAL */
        .hist-item { padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; border-radius: 6px; }
        .hist-item:hover { background: var(--gray); color: var(--sky); }

        #loader { display: none; color: var(--sky); font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 12px; }

        @media (max-width: 800px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; order: 3; border-left: none; border-top: 1px solid #ddd; }
            .main-content { height: auto; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="card">
            <div id="loader">⚡ PROCESANDO...</div>
            <div class="search-group">
                <input type="text" id="qrIn" placeholder="Introducir TP..." autofocus>
                <button onclick="buscar()">CONSULTAR</button>
            </div>
        </div>

        <div id="res" style="display:none;">
            <div class="info-grid">
                <div class="data-card">
                    <b>Equipo / Nodo</b>
                    <div class="val" id="n">-</div>
                    <div class="fsp-badge" id="fsp">-</div>
                    <div id="qrcode"></div>
                </div>
                <div class="data-card">
                    <b>Ubicación</b>
                    <div class="val" id="co" style="font-size:13px;">-</div>
                    <a id="ma" href="#" target="_blank" style="color:var(--sky); font-size:12px; font-weight:bold; text-decoration:none;">📍 Google Maps</a>
                </div>
                <div class="data-card" style="border-top-color: var(--green);">
                    <b>Disponibilidad</b>
                    <div class="val"><span id="li" style="color:var(--green)">0</span> / <span id="to">0</span></div>
                    <small style="font-size:10px; color:#999;">Puertos Libres</small>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pto</th>
                            <th>Estado / Cliente</th>
                        </tr>
                    </thead>
                    <tbody id="tb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h4>🕒 RECIENTES</h4>
        <div id="hist"></div>
    </div>

    <script>
        let qrGen = new QRCode(document.getElementById("qrcode"), { width: 45, height: 45 });
        const api = "https://apiservice.sistemastp.com.mx/gsa/lite/v1/port/qr?qr=";
        const proxy = "https://api.allorigins.win/get?url=";

        window.onload = () => updateHistUI();

        async function buscar(val = null) {
            const q = (val || document.getElementById('qrIn').value).trim().toUpperCase();
            if(!q) return;

            document.getElementById('qrIn').value = q;
            document.getElementById('loader').style.display = 'block';

            try {
                // Fetch con prioridad y caché de busto para velocidad
                const r = await fetch(`${proxy}${encodeURIComponent(api + q)}&_=${Date.now()}`, { priority: 'high' });
                const w = await r.json();
                const d = JSON.parse(w.contents);

                if (d.splitters && d.splitters.length > 0) {
                    render(d, q);
                    saveHist(q);
                } else { alert("No encontrado"); }
            } catch (e) { alert("Error de red"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function render(d, q) {
            const s = d.splitters[0];
            const p = s.listmodelpuertos;

            document.getElementById('n').innerText = s.nombre || d.nombreCaja;
            document.getElementById('fsp').innerText = `F:${s.frame} S:${s.slot} P:${s.puerto}`;
            document.getElementById('co').innerText = `${d.latitud}, ${d.longitud}`;
            document.getElementById('ma').href = `https://www.google.com/maps/search/?api=1&query=${d.latitud},${d.longitud}`;
            
            qrGen.clear(); qrGen.makeCode(q);

            const libres = p.filter(x => x.estatusPuerto == "1").length;
            document.getElementById('li').innerText = libres;
            document.getElementById('to').innerText = p.length;

            // Construcción ultra-rápida de tabla
            let rows = '';
            for(let i=0; i<p.length; i++){
                const esL = p[i].estatusPuerto == "1";
                rows += `<tr>
                    <td><b>${p[i].numeroPuerto}</b></td>
                    <td><span class="${esL ? 'st-1' : 'st-occ'}">${esL ? 'LIBRE' : (p[i].cuenta || 'OCUPADO')}</span></td>
                </tr>`;
            }
            document.getElementById('tb').innerHTML = rows;
            document.getElementById('res').style.display = 'block';
        }

        function saveHist(q) {
            let l = JSON.parse(localStorage.getItem('gsa_h')) || [];
            l = [q, ...l.filter(x => x !== q)].slice(0, 10);
            localStorage.setItem('gsa_h', JSON.stringify(l));
            updateHistUI();
        }

        function updateHistUI() {
            const l = JSON.parse(localStorage.getItem('gsa_h')) || [];
            document.getElementById('hist').innerHTML = l.map(x => `
                <div class="hist-item" onclick="buscar('${x}')">
                    <span>${x}</span><small>➜</small>
                </div>`).join('');
        }

        document.getElementById('qrIn').addEventListener('keypress', e => { if(e.key === 'Enter') buscar(); });
    </script>
</body>
</html>
